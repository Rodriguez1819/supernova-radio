<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Supernova Love Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ====== FONDO ====== */
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      background: 
        linear-gradient(135deg, #1a0033 0%, #330066 25%, #4d0099 50%, #330066 75%, #1a0033 100%),
        radial-gradient(circle at 20% 50%, rgba(232, 30, 77, 0.3), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.3), transparent 50%);
      background-size: 400% 400%, 100% 100%, 100% 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: gradient 8s ease infinite;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%, 0% 0%, 0% 0%; }
      50% { background-position: 100% 50%, 0% 0%, 0% 0%; }
      100% { background-position: 0% 50%, 0% 0%, 0% 0%; }
    }

    /* ====== CONTENEDOR ====== */
    .radio-box {
      background: rgba(20, 20, 30, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 40px rgba(232, 30, 77, 0.6),
                  0 0 80px rgba(138, 43, 226, 0.3);
      color: #fff;
      border: 1px solid rgba(232, 30, 77, 0.3);
    }

    .radio-box h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #ff5fa2;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(232, 30, 77, 0.5);
    }

    .radio-box p {
      font-size: 14px;
      opacity: 0.85;
      margin: 0 0 25px;
      color: #ddd;
    }

    /* ====== CASTER WIDGET CONTAINER ====== */
    .player-container {
      margin: 20px 0;
    }

    .cstrEmbed {
      width: 100%;
    }

    /* ====== POWERED BY LINKS (OBLIGATORIOS) ====== */
    .cstrEmbed a {
      font-size: 11px;
      color: #999;
      opacity: 0.7;
      text-decoration: none;
      display: inline-block;
      margin: 3px 4px;
      transition: all 0.3s ease;
      padding: 2px 4px;
    }

    .cstrEmbed a:hover {
      color: #ff5fa2;
      opacity: 1;
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 480px) {
      .radio-box {
        padding: 30px 20px;
        margin: 20px;
      }

      .radio-box h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="radio-box">
    <h1>🌌 Supernova Love Radio</h1>
    <p>Transmitiendo vibes estilo IVE ✨</p>

    <div class="player-container">
      <div
        data-type="newStreamPlayer"
        data-publicToken="ad6151a0-1bee-4b22-ab73-14a4d2cd6d01"
        data-theme="dark"
        data-color="e81e4d"
        class="cstrEmbed">
        
        <!-- LINKS OBLIGATORIOS PARA CASTER - NO ELIMINAR -->
        <a href="https://www.caster.fm" target="_blank">Powered by Caster</a>
        <a href="https://www.caster.fm" target="_blank">Shoutcast Hosting</a>
        <a href="https://www.caster.fm" target="_blank">Stream Hosting</a>
      </div>
    </div>
  </div>

  <!-- SCRIPT DE CASTER - DEBE ESTAR DESPUÉS DEL DIV -->
  <script src="https://cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
